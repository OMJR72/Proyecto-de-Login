<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <title>index</title>
</head>
<body>
    <!--El navbar-->
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
        <div class="container-fluid d-flex justify-content-between">
            <ul class="navbar-nav w-100 justify-content-evenly">
                <li>
                    <button class="btn btn-outline-light me-2"
                        data-bs-toggle="offcanvas"
                        data-bs-target="#menu">
                        ☰
                    </button>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Home</a>
                </li>
                <li>
                    <button class="btn btn-primary"
                        data-bs-toggle="collapse"
                        data-bs-target="#cerrar">
                        <span id="usuario"></span>
                    </button>
                    <div class="collapse" id="cerrar">
                        <a href="login.html" class="btn btn-danger">Cerrar Sesion</a>
                    </div>
                </li>
            </ul>
        </div>    
    </nav>
    <div class="offcanvas offcanvas-start" id="menu">
        <div class="offcanvas-header">
            <h5>Menu</h5>
            <button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <!--El cuerpo del sidebar-->
        <div class="offcanvas-body">
            <div class="list-group">

                <button class="list-group-item list-group-item-action"
                    data-bs-toggle="collapse"
                    data-bs-target="#collapse">
                    <span>Usuario</span>
                </button>
                <div class="collapse" id="collapse">
                    <a href="#" id="btnCapturar" class="list-group-item">Capturar</a>
                </div>
                <button id="btnAlumnos" class="list-group-item list-group-item-action">
                    Alumnos
                </button>
                <a href="#" class="list-group-item">Calcular Edad</a>
            </div>
        </div>
    </div>

    <div id="vistaUsuario" class="container mt-5 d-none">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h2>Formulario</h2>
                    </div>
                    <div class="card-body">
                        <form id="formulario">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre de Usuario</label>
                                <input type="text" id="nombreUsuario" class="form-control">
                                <div id="mensajeNombre" class="form-text text-danger"></div>
                            </div>
                            <div class="mb-3">
                                <label for="correo" class="form-label">Correo Electrónico</label>
                                <input type="email" id="correo" class="form-control">
                                <div id="mensajeCorreo" class="form-text text-danger"></div>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" id="password" class="form-control">
                                <div id="mensajePassword" class="form-text text-danger"></div>
                            </div>
                            <button type="button" id="btnValidar" class="btn btn-primary">Capturar</button>
                            <div id="mensaje" class="d-none"></div>
                        </form>
                        <div class="card shadow mt-5">
                            <div class="card-header bg-dark text-white">Usuarios registrados</div>
                            <div class="card-body">
                                <table class="table table-striped table-hover">
                                    <thead class="table-primary">
                                        <tr>
                                            <th>Número</th>
                                            <th>Nombre</th>
                                            <th>Correo</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tablaUsuarios"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toastExito" class="toast text-bg-success" role="alert">
            <div class="d-flex">
                <div class="toast-body">Usuario registrado correctamente.</div>
                <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>
    <div class="d-none" id="vistaAlumnos">
        <div class="container">
            <input type="text" id="control" placeholder="Ingrese el numero de control"></input>
            <input type="text" id="nombre" placeholder="Ingrese el nombre del estudiante"></input>
            <input type="text" id="calificacion" placeholder="Ingrese la calificación" min="0" max="100"></input>
            <button id="btnAnadir">Añadir</button>
            <br><br>
            <input type="text" class="respuesta" id="mayor" placeholder="mayor" readonly></input>
            <br><br>
            <input type="text" class="respuesta" id="menor" placeholder="menor" readonly></input>
            <br><br>
            <input type="text" class="respuesta" id="promedio" placeholder="promedio" readonly></input>
            <br><br>
            <button id="btnCalcular">Calcular</button>
            <br><br>
            <table id="tabla">
                <thead>
                    <tr>
                        <th>No. Control</th>
                        <th>Nombre</th>
                        <th>Calificación</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
