<!DOCTYPE html>

    <head>

        <meta http-equiv="X-UA-Compatible" content="IE=edge">

        <title>Login</title>
    </head>
    <body>
        <div class="seccion">
            <h2>Login</h2>
            <label for="correo">Correo Electrónico</label>

        </div>

        <script src="js/login.js"></script>
    </body>
